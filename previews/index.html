<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Datart Lab Design Previews</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #101820;
      background: #f7f8f7;
    }

    main {
      width: min(100% - 40px, 880px);
      margin: 0 auto;
      padding: 72px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      line-height: 1;
    }

    p {
      max-width: 620px;
      margin: 0 0 32px;
      color: #5a6570;
      font-size: 1.08rem;
      line-height: 1.55;
    }

    ul {
      display: grid;
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    a {
      display: block;
      padding: 18px 20px;
      border: 1px solid #d9dee2;
      border-radius: 8px;
      color: #101820;
      background: #fff;
      font-weight: 750;
      text-decoration: none;
    }

    a:hover {
      border-color: #2f6f73;
      color: #2f6f73;
    }
  </style>
</head>
<body>
  <main>
    <h1>Datart Lab Design Previews</h1>
    <p>Homepage redesign options for review. These preview pages do not change the live homepage.</p>
    <ul>
      <li><a href="/previews/systems-minimal/">Systems Minimal</a></li>
      <li><a href="/previews/ops-console/">Operations Console</a></li>
      <li><a href="/previews/research-editorial/">Research Editorial</a></li>
    </ul>
  </main>
</body>
</html>
